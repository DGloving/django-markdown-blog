{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="description" content="{% block meta_description %}A Python and Django blog focusing on performance and SEO.{% endblock %}">
    
    <title>{% block title %}My Django Blog{% endblock %}</title>
</head>
<body>
    <header>
        <h1><a href="{% url 'blog:post_list' %}">My Django Blog</a></h1>
        <p>A portfolio project built with Python and Markdown.</p>
    </header>

    <main>
        {% block content %}
        {% endblock content %}
    </main>

    <footer>
        <p>&copy; 2026 My Django Blog. Built with performance in mind.</p>
    </footer>
</body>
</html>
